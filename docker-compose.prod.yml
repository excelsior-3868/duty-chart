services:
  # Backend (Django)
  duty-chart-backend:
    image: nexus.ntc.net.np/dutychart/backend:latest
    container_name: duty-chart-backend
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - duty-chart-redis

  # Redis Broker
  duty-chart-redis:
    image: redis:7-alpine
    container_name: duty-chart-redis
    ports:
      - "6379:6379"

  # Celery Worker
  duty-chart-celery-worker:
    image: nexus.ntc.net.np/dutychart/backend:latest
    container_name: duty-chart-celery-worker
    command: celery -A config worker --loglevel=info
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - duty-chart-backend
      - duty-chart-redis

  # Celery Beat
  duty-chart-celery-beat:
    image: nexus.ntc.net.np/dutychart/backend:latest
    container_name: duty-chart-celery-beat
    command: celery -A config beat --loglevel=info
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - duty-chart-backend
      - duty-chart-redis

  # Frontend (React + Nginx)
  duty-chart-frontend:
    image: nexus.ntc.net.np/dutychart/frontend:latest
    container_name: duty-chart-frontend
    ports:
      - "80:80"
    volumes:
      - static_volume:/usr/share/nginx/html/static:ro
      - media_volume:/usr/share/nginx/html/media:ro
    env_file:
      - .env
    depends_on:
      - duty-chart-backend

volumes:
  static_volume:
  media_volume:
